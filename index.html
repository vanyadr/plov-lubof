<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Плов Любоф</title>

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./assets/libraries/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="js/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="header__inner container">
            <div class="header__logo logo-left">
                <img src="./assets/images/logo1.svg" alt="Логотип">
            </div>
            <button type="button" class="header__burger">
                <img src="./assets/images/burger.svg" alt="Меню">
            </button>
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-item">
                        <a href="#" class="header__nav-link">О нас</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="#" class="header__nav-link">Меню</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="#" class="header__nav-link">Интерьер</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="#" class="header__nav-link">Доставка</a>
                    </li>
                </ul>
            </nav>
            <div class="header__logo">
                <img src="./assets/images/logo2.svg" alt="Логотип">
            </div>
        </div>
    </header>
    <main>
        <section class="screen container">
            <div class="screen__inner grid">
                <h1 class="hidden">Плов Любоф</h1>
                <div class="screen__name">
                    <div class="screen__img">
                        <img src="./assets/images/plov.svg" alt="Плов">
                    </div>
                    <div class="screen__img">
                        <img src="./assets/images/lubof.svg" alt="Любоф">
                    </div>
                </div>
                <div class="screen__plov">
                    <div class="screen__plov-img">
                        <img src="./assets/images/plov.webp" alt="Плов">
                    </div>
                </div>
                <a href="#" class="screen__menu">
                    <span class="screen__menu-text">смотреть меню</span>
                    <div class="screen__menu-img">
                        <img src="./assets/images/arrowLong.svg" alt="Меню">
                    </div>
                </a>
            </div>
        </section>
    </main>
    <footer></footer>
</body>
</html>
